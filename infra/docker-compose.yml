services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mercury
      POSTGRES_PASSWORD: mercury
      POSTGRES_DB: mercury
    ports:
      - "5432:5432"
    volumes:
      - mercury-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - mercury-redis:/data

volumes:
  mercury-postgres:
  mercury-redis:
